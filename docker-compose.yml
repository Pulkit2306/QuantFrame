version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       quantframe
      POSTGRES_USER:     quantframe
      POSTGRES_PASSWORD: quantframe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantframe"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: layer1_pipeline/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      "postgresql://quantframe:quantframe@postgres:5432/quantframe"
      ALPACA_API_KEY:    "${ALPACA_API_KEY}"
      ALPACA_SECRET_KEY: "${ALPACA_SECRET_KEY}"
    command: ["python", "-m", "layer1_pipeline", "ingest"]

  backend:
    build:
      context: .
      dockerfile: layer4_dashboard/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://quantframe:quantframe@postgres:5432/quantframe"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    ports:
      - "8000:8000"
    command: ["uvicorn", "layer4_dashboard.backend.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
